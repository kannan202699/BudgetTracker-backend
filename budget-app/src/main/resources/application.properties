spring.application.name=budget-app

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.jakarta.persistence.validation.mode=none

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.keepalive-time=30000

jwt.secret=${JWT_SECRET}
# Access token: 30 min; refresh token: 7 days (override via env vars in production)
refresh.token.validity.days=${REFRESH_TOKEN_VALIDITY_DAYS:7}
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}

server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=4MB
server.tomcat.max-http-form-post-size=2MB

server.port=${PORT:1010}

logging.level.com.budgettracker=DEBUG
logging.level.org.springframework.security=WARN

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.test-connection=false
app.frontend.url=${FRONTEND_URL:http://localhost:5050}
app.name=BudgetPro
