spring.application.name=budget-app

# ── Database ──────────────────────────────────────────────────────────────────
# Use environment variables in production; fallback values for local dev
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Disable JPA lifecycle bean validation — rely on Spring MVC @Valid only
spring.jpa.properties.jakarta.persistence.validation.mode=none

# ── Connection Pool ───────────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.keepalive-time=30000

# ── Security Secrets ──────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
# Access token: 30 min; refresh token: 7 days (override via env vars in production)
refresh.token.validity.days=${REFRESH_TOKEN_VALIDITY_DAYS:7}
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}

# ── Error Response Hardening (never expose internals) ─────────────────────────
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never

# ── Request Size Limits ───────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=4MB
server.tomcat.max-http-form-post-size=2MB

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:1010}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.budgettracker=INFO
logging.level.org.springframework.security=WARN
